name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-binary:
    name: Build release binary
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libpipewire-0.3-dev \
            pipewire \
            pipewire-pulse

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --features "desktop-ui system-audio"

      - name: Strip binary
        run: strip target/release/pipemeeter

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipemeeter-linux-x86_64
          path: target/release/pipemeeter

  build-deb:
    name: Build .deb package
    runs-on: ubuntu-24.04
    needs: build-binary
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libpipewire-0.3-dev \
            pipewire \
            pipewire-pulse

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Download pre-built binary
        uses: actions/download-artifact@v4
        with:
          name: pipemeeter-linux-x86_64
          path: target/release/

      - name: Mark binary executable
        run: chmod +x target/release/pipemeeter

      - name: Build .deb
        run: cargo deb --no-build --features "desktop-ui system-audio"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipemeeter-deb
          path: target/debian/*.deb

  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: [build-binary, build-deb]
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: pipemeeter-linux-x86_64
          path: dist/

      - name: Download .deb
        uses: actions/download-artifact@v4
        with:
          name: pipemeeter-deb
          path: dist/

      - name: Rename binary with version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mv dist/pipemeeter dist/pipemeeter-${VERSION}-linux-x86_64
          chmod +x dist/pipemeeter-${VERSION}-linux-x86_64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/pipemeeter-*
            dist/*.deb
